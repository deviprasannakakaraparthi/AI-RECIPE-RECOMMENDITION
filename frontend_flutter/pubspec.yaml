name: recipe_ai_flutter
description: A premium AI-powered recipe recommendation app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.0
  google_fonts: ^6.1.0
  http_parser: ^4.0.2
  intl: ^0.18.1
  flutter_spinkit: ^5.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
